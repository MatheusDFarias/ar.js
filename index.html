<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Navegador AR 3D - Olhando a Rua</title>

  <link rel="icon" href="data:,">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; background-color: #000; }
    
    /* Vídeo da câmera ocupando todo o fundo */
    #webcam-video {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1;
    }

    /* Tela do Three.js por cima do vídeo (transparente) */
    #canvas-three {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none;
    }

    /* Mini Mapa redondo no canto inferior */
    #mini-map {
      position: absolute; bottom: 20px; right: 20px;
      width: 130px; height: 130px; border-radius: 50%;
      border: 3px solid #fff; box-shadow: 0px 0px 10px rgba(0,0,0,0.5); z-index: 10;
    }
    
    /* Painel de Texto Superior */
    #hud-texto {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8); color: white; padding: 12px 20px;
      border-radius: 20px; font-size: 15px; font-weight: bold; z-index: 10;
      text-align: center; width: 80%; max-width: 300px; white-space: pre-line;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
    }
    
    /* Tela de Permissão Inicial */
    #tela-permissao {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95); color: white; z-index: 99;
      display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;
    }
    
    #btn-iniciar {
      background: #00ffcc; color: black; border: none; padding: 15px 30px;
      font-size: 18px; font-weight: bold; border-radius: 25px; cursor: pointer; margin-top: 20px;
      box-shadow: 0 0 15px #00ffcc;
    }
  </style>
</head>
<body>

  <div id="tela-permissao">
    <h2>Navegador AR Urbano</h2>
    <p>Segure o celular **em pé** olhando para a rua.<br>Ative os sensores para projetar a seta de navegação.</p>
    <button id="btn-iniciar">ATIVAR CÂMERA E GPS</button>
  </div>

  <div id="hud-texto">Aguardando ativação dos sensores...</div>
  
  <video id="webcam-video" autoplay playsinline></video>
  <canvas id="canvas-three"></canvas>
  <div id="mini-map"></div>

  <script>
    // --- Coordenadas de Teste (Fortaleza) ---
    let posAtual = { lat: -3.7413823, lng: -38.5131173 }; 
    const posDestino = { lat: -3.74128, lng: -38.510776 };
    
    // Variáveis de orientação dos sensores
    let rawAlpha = 0, rawBeta = 0, rawGamma = 0;
    let headingCamera = 0; 

    let cena, camera, renderizador, setaGrupo;

    // Elementos auxiliares do Three.js para calcular a direção 3D da câmera traseira
    const eulerDispositivo = new THREE.Euler();
    const quatDispositivo = new THREE.Quaternion();
    const vetorCameraTraseira = new THREE.Vector3(0, 0, -1); 

    document.getElementById('btn-iniciar').addEventListener('click', async function() {
      document.getElementById('tela-permissao').style.display = 'none';
      document.getElementById('hud-texto').innerText = "Ligando câmera e calibrando bússola...";

      // 1. Liga a câmera traseira do celular ao fundo
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: "environment" }, 
          audio: false 
        });
        document.getElementById('webcam-video').srcObject = stream;
      } catch (err) {
        alert("Erro crítico: Não foi possível acessar a câmera traseira.");
        console.error(err);
      }

      // 2. Solicita sensores de movimento/bússola (Tratamento para iOS e Android modernos)
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
          .then(state => {
            if (state === 'granted') {
              window.addEventListener('deviceorientationabsolute', capturarMovimento, true);
            } else {
              alert('A permissão da bússola foi negada. A seta não vai girar.');
            }
            inicializarSistemas();
          }).catch(inicializarSistemas);
      } else {
        const tipoEvento = 'ondeviceorientationabsolute' in window ? 'deviceorientationabsolute' : 'deviceorientation';
        window.addEventListener(tipoEvento, capturarMovimento, true);
        inicializarSistemas();
      }
    });

    function capturarMovimento(event) {
      // Guarda os valores brutos para processamento na função de animação
      if (event.webkitCompassHeading) {
        headingCamera = event.webkitCompassHeading; // Atalho nativo do iOS (Safari)
      } else {
        rawAlpha = event.alpha;
        rawBeta = event.beta;
        rawGamma = event.gamma;
        
        // COMPENSAÇÃO DE INCLINAÇÃO (Para o celular em pé):
        // Converte os ângulos do celular para radianos e aplica na matriz do Three.js
        const alphaRad = THREE.MathUtils.degToRad(rawAlpha || 0);
        const betaRad = THREE.MathUtils.degToRad(rawBeta || 0);
        const gammaRad = THREE.MathUtils.degToRad(rawGamma || 0);

        // A convenção de sensores mobile usa a ordem YXZ
        eulerDispositivo.set(betaRad, alphaRad, -gammaRad, 'YXZ');
        quatDispositivo.setFromEuler(eulerDispositivo);

        // Descobre para qual coordenada geográfica o vetor da câmera traseira está apontando
        const direcaoOlhar = vetorCameraTraseira.clone().applyQuaternion(quatDispositivo);
        
        // Projeta o vetor no plano horizontal da Terra para extrair o Rumo Magnético exato (Heading)
        let anguloCalculado = Math.atan2(direcaoOlhar.x, direcaoOlhar.y) * 180 / Math.PI;
        headingCamera = (anguloCalculado + 360) % 360;
      }
    }

    function inicializarSistemas() {
      configurarCena3D();
      ativarGPS();
      executarLoop();
    }

    // --- CONFIGURAÇÃO GRÁFICA DO THREE.JS ---
    function configurarCena3D() {
      const canvas = document.getElementById('canvas-three');
      cena = new THREE.Scene();

      // Câmera virtual do motor olhando para a frente
      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 0, 0);

      renderizador = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
      renderizador.setSize(window.innerWidth, window.innerHeight);
      renderizador.setPixelRatio(window.devicePixelRatio);

      // Criando o grupo da Seta de Navegação
      setaGrupo = new THREE.Group();

      // Cabeça da seta (Cone plano deitado apontando para frente)
      const coneGeo = new THREE.ConeGeometry(0.2, 0.5, 4);
      const coneMat = new THREE.MeshBasicMaterial({ color: 0xff2222 });
      const cone = new THREE.Mesh(coneGeo, coneMat);
      cone.rotation.x = -Math.PI / 2; // Deita o cone na horizontal
      cone.position.set(0, 0, -0.4);   // Empurra a ponta para a frente do corpo

      // Corpo/Haste da seta (Linha reta de profundidade)
      const caixaGeo = new THREE.BoxGeometry(0.08, 0.02, 0.4);
      const caixaMat = new THREE.MeshBasicMaterial({ color: 0xaa0000 });
      const caixa = new THREE.Mesh(caixaGeo, caixaMat);
      caixa.position.set(0, 0, 0);

      setaGrupo.add(cone);
      setaGrupo.add(caixa);
      
      // POSICIONAMENTO E PERSPECTIVA:
      // Coloca a seta flutuando na parte inferior central do visor (Z = -2 metros para frente)
      setaGrupo.position.set(0, -0.5, -2.0); 
      // Inclina o grupo levemente para baixo para o usuário ver o desenho 3D da estrada de cima
      setaGrupo.rotation.x = 0.3; 

      cena.add(setaGrupo);

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderizador.setSize(window.innerWidth, window.innerHeight);
      });
    }

    // --- CÁLCULOS GEOGRÁFICOS DE NAVEGAÇÃO ---
    function calcularRumoDestino(lat1, lon1, lat2, lon2) {
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const lat1Rad = lat1 * Math.PI / 180;
      const lat2Rad = lat2 * Math.PI / 180;
      const y = Math.sin(dLon) * Math.cos(lat2Rad);
      const x = Math.cos(lat1Rad) * Math.sin(lat2Rad) - Math.sin(lat1Rad) * Math.cos(lat2Rad) * Math.cos(dLon);
      return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
    }

    function calcularDistanciaMetros(lat1, lon1, lat2, lon2) {
      const R = 6371e3;
      const rLat1 = lat1 * Math.PI / 180; const rLat2 = lat2 * Math.PI / 180;
      const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(rLat1) * Math.cos(rLat2) * Math.sin(dLon/2) * Math.sin(dLon/2);
      return Math.round(R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))));
    }

    // --- LOOP DE ATUALIZAÇÃO DA SETA (TICK) ---
    function executarLoop() {
      requestAnimationFrame(executarLoop);

      if (setaGrupo) {
        // Ângulo geográfico onde o destino está localizado (Rumo/Bearing)
        const rumoAlvo = calcularRumoDestino(posAtual.lat, posAtual.lng, posDestino.lat, posDestino.lng);
        
        // Calcula a diferença entre onde o destino está e para onde a câmera está apontada
        const diferencaAngular = rumoAlvo - headingCamera;
        const anguloRad = (diferencaAngular * Math.PI) / 180;

        // Gira a seta apenas no eixo Y (Esquerda / Direita na tela)
        // Mantém a inclinação de solo fixa para que você veja a seta deitada na rua olhando de frente
        setaGrupo.rotation.y = -anguloRad;
      }

      renderizador.render(cena, camera);
    }

    // --- MINI MAPA LEAFLET ---
    const map = L.map('mini-map', { zoomControl: false, attributionControl: false }).setView([posAtual.lat, posAtual.lng], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const marcadorUsuario = L.marker([posAtual.lat, posAtual.lng]).addTo(map);
    const marcadorDestino = L.marker([posDestino.lat, posDestino.lng]).addTo(map);
    const rotaLinha = L.polyline([[posAtual.lat, posAtual.lng], [posDestino.lat, posDestino.lng]], { color: '#ff2222', weight: 4 }).addTo(map);

    function ativarGPS() {
      if (navigator.geolocation) {
        navigator.geolocation.watchPosition((position) => {
          posAtual.lat = position.coords.latitude;
          posAtual.lng = position.coords.longitude;

          // Atualiza o mapa Leaflet de fundo
          marcadorUsuario.setLatLng([posAtual.lat, posAtual.lng]);
          map.setView([posAtual.lat, posAtual.lng]);
          rotaLinha.setLatLngs([[posAtual.lat, posAtual.lng], [posDestino.lat, posDestino.lng]]);

          // Atualiza a distância no HUD
          const metros = calcularDistanciaMetros(posAtual.lat, posAtual.lng, posDestino.lat, posDestino.lng);
          document.getElementById('hud-texto').innerText = `${metros}m para o destino.\nSiga a seta vermelha na rua!`;
        }, (err) => {
          // Se falhar (ex: testando no computador), calcula com base nas coordenadas simuladas de Fortaleza
          const metros = calcularDistanciaMetros(posAtual.lat, posAtual.lng, posDestino.lat, posDestino.lng);
          document.getElementById('hud-texto').innerText = `${metros}m (Simulado).\nSegure em pé e mire na rua!`;
        }, { enableHighAccuracy: true, maximumAge: 0 });
      }
    }
  </script>
</body>
</html>
