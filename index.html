<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Festival Navigation - AR.js</title>
  
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

  <style>
    body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
    
    /* Tela de ativação para segurança do navegador */
    #tela-permissao {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: #121214; z-index: 9999; display: flex; flex-direction: column;
      justify-content: center; align-items: center; color: white; text-align: center; padding: 20px;
    }
    button {
      background: #00ff88; color: #121214; border: none; padding: 15px 40px;
      font-size: 18px; font-weight: bold; border-radius: 30px; cursor: pointer; margin-top: 20px;
    }
    #hud {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      z-index: 10; background: rgba(0,0,0,0.8); color: #00ff88;
      padding: 10px 20px; border-radius: 20px; font-weight: bold; display: none;
    }
  </style>
</head>
<body>

  <div id="tela-permissao">
    <h2>Navegador do Festival</h2>
    <p>Ative a câmera e a localização para ver os palcos em Realidade Aumentada.</p>
    <button onclick="solicitarPermissoes()">ENTRAR NO MAPA AR</button>
  </div>

  <div id="hud" id="txt-hud">Buscando sinal do GPS...</div>

  <a-scene vr-mode-ui="enabled: false" embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    
    <a-camera gps-camera rotation-reader></a-camera>

    <a-entity id="marcador-destino"></a-entity>

  </a-scene>

  <script>
    // 1. Pega os dados enviados pela WebView do React Native (?lat=-23.5&lng=-46.6&nome=Palco)
    const urlParams = new URLSearchParams(window.location.search);
    const destinoLat = parseFloat(urlParams.get('lat'));
    const destinoLng = parseFloat(urlParams.get('lng'));
    const destinoNome = urlParams.get('nome') || "Destino";

    function solicitarPermissoes() {
      // Solicita permissão de orientação (Obrigatório para iOS)
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
          .then(response => {
            if (response === 'granted') { iniciarAR(); }
          }).catch(console.error);
      } else {
        iniciarAR(); // Android entra direto aqui
      }
    }

    function iniciarAR() {
      document.getElementById('tela-permissao').style.display = 'none';
      const hud = document.getElementById('hud');
      hud.style.display = 'block';
      hud.innerText = `Siga em direção ao: ${destinoNome}`;

      if (destinoLat && destinoLng) {
        const principalContainer = document.getElementById('marcador-destino');

        // Configura a posição geográfica real do objeto usando o AR.js
        principalContainer.setAttribute('gps-entity-place', `latitude: ${destinoLat}; longitude: ${destinoLng};`);

        /* Renderiza um Pin flutuante gigante (Cone invertido) no local exato do destino.
          Colocamos 'position="0 15 0"' para que ele flutue a 15 metros do chão, 
          ficando visível mesmo acima da cabeça das pessoas no festival.
        */
        principalContainer.innerHTML = `
          <a-cone color="#00ff88" radius-bottom="2" radius-top="0" height="5" position="0 15 0" rotation="180 0 0"></a-cone>
          <a-text value="${destinoNome}" look-at="[gps-camera]" scale="25 25 25" position="0 20 0" align="center" color="#ffffff"></a-text>
        `;
      } else {
        alert("Erro: Coordenadas de destino ausentes na URL.");
      }
    }
  </script>
</body>
</html>
