<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Navegador AR 3D - Direção Corrigida</title>

  <link rel="icon" href="data:,">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; background-color: #000; }
    
    #webcam-video {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1;
    }

    #canvas-three {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none;
    }

    #mini-map {
      position: absolute; bottom: 20px; right: 20px;
      width: 130px; height: 130px; border-radius: 50%;
      border: 3px solid #fff; box-shadow: 0px 0px 10px rgba(0,0,0,0.5); z-index: 10;
    }
    
    #hud-texto {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8); color: white; padding: 12px 20px;
      border-radius: 20px; font-size: 15px; font-weight: bold; z-index: 10;
      text-align: center; width: 80%; max-width: 300px; white-space: pre-line;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
    }
    
    #tela-permissao {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95); color: white; z-index: 99;
      display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;
    }
    
    #btn-iniciar {
      background: #00e5ff; color: black; border: none; padding: 15px 30px;
      font-size: 18px; font-weight: bold; border-radius: 25px; cursor: pointer; margin-top: 20px;
      box-shadow: 0 0 15px #00e5ff;
    }
  </style>
</head>
<body>

  <div id="tela-permissao">
    <h2>Navegador AR Saint White</h2>
    <p>Olhe pelo celular em pé apontando para a rua.<br>Ative os sensores para visualizar o trajeto em tempo real.</p>
    <button id="btn-iniciar">ATIVAR NAVEGAÇÃO 3D</button>
  </div>

  <div id="hud-texto">Aguardando ativação dos sensores...</div>
  
  <video id="webcam-video" autoplay playsinline></video>
  <canvas id="canvas-three"></canvas>
  <div id="mini-map"></div>

  <script>
    // --- Coordenadas (Fortaleza - Alinhado com seus testes) ---
    let posAtual = { lat: -3.7413823, lng: -38.5131173 }; 
    const posDestino = { lat: -3.7415538, lng: -38.5105072 };
    let headingCamera = 0; 

    let cena, camera, renderizador, setaGrupo;

    // Conversores matemáticos de matrizes de rotação 3D
    const eulerDispositivo = new THREE.Euler();
    const quatDispositivo = new THREE.Quaternion();
    const vetorCameraTraseira = new THREE.Vector3(0, 0, -1); 

    document.getElementById('btn-iniciar').addEventListener('click', async function() {
      document.getElementById('tela-permissao').style.display = 'none';
      document.getElementById('hud-texto').innerText = "Estabilizando imagem e sensores...";

      // Inicializa câmera
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
        document.getElementById('webcam-video').srcObject = stream;
      } catch (err) {
        alert("Não foi possível abrir a câmera traseira.");
      }

      // Sensores modernos de orientação absoluta (Bússola sem travamento em pé)
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
          .then(state => {
            if (state === 'granted') {
              window.addEventListener('deviceorientationabsolute', calcularDirecaoReal, true);
            }
            inicializarSistemas();
          }).catch(inicializarSistemas);
      } else {
        const tipoEvento = 'ondeviceorientationabsolute' in window ? 'deviceorientationabsolute' : 'deviceorientation';
        window.addEventListener(tipoEvento, calcularDirecaoReal, true);
        inicializarSistemas();
      }
    });

    // Filtro matemático que impede a seta de travar quando o celular fica em pé
    function calcularDirecaoReal(event) {
      if (event.webkitCompassHeading) {
        headingCamera = event.webkitCompassHeading; // iOS Nativo
      } else {
        // Android / Chrome: Transforma os dados brutos em uma matriz estável em pé
        const alphaRad = THREE.MathUtils.degToRad(event.alpha || 0);
        const betaRad = THREE.MathUtils.degToRad(event.beta || 0);
        const gammaRad = THREE.MathUtils.degToRad(event.gamma || 0);

        eulerDispositivo.set(betaRad, alphaRad, -gammaRad, 'YXZ');
        quatDispositivo.setFromEuler(eulerDispositivo);

        // Identifica para onde a lente traseira (-Z) aponta no mundo real
        const direcaoOlhar = vetorCameraTraseira.clone().applyQuaternion(quatDispositivo);
        
        // Projeta no plano horizontal do chão para ignorar a inclinação vertical do braço
        let anguloCalculado = Math.atan2(direcaoOlhar.x, -direcaoOlhar.z) * 180 / Math.PI;
        headingCamera = (anguloCalculado + 360) % 360;
      }
    }

    function inicializarSistemas() {
      configurarCena3D();
      ativarGPS();
      executarLoop();
    }

    // --- MODELAGEM DA SETA ESTILO CURSOR NAV (FOTO) ---
    function configurarCena3D() {
      const canvas = document.getElementById('canvas-three');
      cena = new THREE.Scene();

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 0, 0);

      renderizador = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
      renderizador.setSize(window.innerWidth, window.innerHeight);
      renderizador.setPixelRatio(window.devicePixelRatio);

      // Adiciona Iluminação para criar o reflexo metalizado/cristalizado da imagem
      const luzAmbiente = new THREE.AmbientLight(0xffffff, 0.6);
      cena.add(luzAmbiente);
      const luzDirecional = new THREE.DirectionalLight(0xffffff, 1.0);
      luzDirecional.position.set(2, 5, 3);
      cena.add(luzDirecional);

      setaGrupo = new THREE.Group();

      // Desenhando a forma exata do cursor da foto (Chevron / Arrowhead)
      const formatoSeta = new THREE.Shape();
      formatoSeta.moveTo(0, 0.45);        // Ponta frontal
      formatoSeta.lineTo(0.3, -0.35);     // Asa Direita externa
      formatoSeta.lineTo(0, -0.15);       // Entrada central traseira (V-notch)
      formatoSeta.lineTo(-0.3, -0.35);    // Asa Esquerda externa
      formatoSeta.lineTo(0, 0.45);        // Fecha na ponta

      // Configuração para deixar o modelo 3D volumoso e com quinas chanfradas brilhantes
      const configuracaoExtrusao = {
        depth: 0.06,
        bevelEnabled: true,
        bevelSegments: 4,
        steps: 1,
        bevelSize: 0.015,
        bevelThickness: 0.015
      };

      const geometriaSeta = new THREE.ExtrudeGeometry(formatoSeta, configuracaoExtrusao);
      geometriaSeta.center(); // Centraliza o eixo interno da peça

      // Material azul brilhante com leve transparência (Igual ao enviado)
      const materialSeta = new THREE.MeshStandardMaterial({
        color: 0x00b0ff,
        roughness: 0.15,
        metalness: 0.4,
        transparent: true,
        opacity: 0.85,
        side: THREE.DoubleSide
      });

      const setaMesh = new THREE.Mesh(geometriaSeta, materialSeta);
      
      // Deita a malha para ficar plana paralelamente ao asfalto da rua
      setaMesh.rotation.x = -Math.PI / 2;

      setaGrupo.add(setaMesh);
      
      // Ajusta a seta na parte de baixo da tela, flutuando à frente no campo de visão
      setaGrupo.position.set(0, -0.6, -2.2); 
      setaGrupo.rotation.x = 0.35; // Inclina levemente para dar perspectiva de profundidade na estrada

      cena.add(setaGrupo);

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderizador.setSize(window.innerWidth, window.innerHeight);
      });
    }

    // --- GEOLOCALIZAÇÃO ---
    function calcularRumoDestino(lat1, lon1, lat2, lon2) {
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const lat1Rad = lat1 * Math.PI / 180;
      const lat2Rad = lat2 * Math.PI / 180;
      const y = Math.sin(dLon) * Math.cos(lat2Rad);
      const x = Math.cos(lat1Rad) * Math.sin(lat2Rad) - Math.sin(lat1Rad) * Math.cos(lat2Rad) * Math.cos(dLon);
      return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
    }

    function calcularDistanciaMetros(lat1, lon1, lat2, lon2) {
      const R = 6371e3;
      const rLat1 = lat1 * Math.PI / 180; const rLat2 = lat2 * Math.PI / 180;
      const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(rLat1) * Math.cos(rLat2) * Math.sin(dLon/2) * Math.sin(dLon/2);
      return Math.round(R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))));
    }

    // --- LOOP DINÂMICO DE ATUALIZAÇÃO ---
    function executarLoop() {
      requestAnimationFrame(executarLoop);

      if (setaGrupo) {
        const rumoDestino = calcularRumoDestino(posAtual.lat, posAtual.lng, posDestino.lat, posDestino.lng);
        
        // Faz a rotação responder de forma fluida para onde a câmera mira
        const anguloDiferenca = rumoDestino - headingCamera;
        const anguloRad = (anguloDiferenca * Math.PI) / 180;

        // Gira no eixo Y (esquerda/direita) acompanhando o cenário da rua de forma dinâmica
        setaGrupo.rotation.y = anguloRad;
      }

      renderizador.render(cena, camera);
    }

    // --- MAPA LEAFLET ---
    const map = L.map('mini-map', { zoomControl: false, attributionControl: false }).setView([posAtual.lat, posAtual.lng], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const marcadorUsuario = L.marker([posAtual.lat, posAtual.lng]).addTo(map);
    const marcadorDestino = L.marker([posDestino.lat, posDestino.lng]).addTo(map);
    const rotaLinha = L.polyline([[posAtual.lat, posAtual.lng], [posDestino.lat, posDestino.lng]], { color: '#00b0ff', weight: 4 }).addTo(map);

    function ativarGPS() {
      if (navigator.geolocation) {
        navigator.geolocation.watchPosition((position) => {
          posAtual.lat = position.coords.latitude;
          posAtual.lng = position.coords.longitude;

          marcadorUsuario.setLatLng([posAtual.lat, posAtual.lng]);
          map.setView([posAtual.lat, posAtual.lng]);
          rotaLinha.setLatLngs([[posAtual.lat, posAtual.lng], [posDestino.lat, posDestino.lng]]);

          const metros = calcularDistanciaMetros(posAtual.lat, posAtual.lng, posDestino.lat, posDestino.lng);
          document.getElementById('hud-texto').innerText = `${metros}m para o destino.\nSiga o indicador azul na rua!`;
        }, (err) => {
          const metros = calcularDistanciaMetros(posAtual.lat, posAtual.lng, posDestino.lat, posDestino.lng);
          document.getElementById('hud-texto').innerText = `${metros}m (Modo Simulado).\nMire a câmera para a rua!`;
        }, { enableHighAccuracy: true, maximumAge: 0 });
      }
    }
  </script>
</body>
</html>
