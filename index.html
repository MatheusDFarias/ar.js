<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR.js Navigation MVP</title>

<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
<script src="./js/app.js"></script>

<style>
body { margin:0; overflow:hidden; }
#info {
 position:fixed;
 top:10px;
 left:10px;
 z-index:999;
 background:rgba(0,0,0,.7);
 color:white;
 padding:10px;
 border-radius:8px;
 font-family:Arial;
}
</style>
</head>
<body>

<div id="info">
  <div>AR Navigation MVP</div>
  <div id="distance">Aguardando GPS...</div>
</div>

<a-scene
 embedded
 vr-mode-ui="enabled:false"
 arjs="sourceType:webcam; videoTexture:true; debugUIEnabled:false;">

 <a-camera gps-new-camera></a-camera>

 <a-entity id="waypoint"
    geometry="primitive: cone; radiusBottom: 2; radiusTop: 0.2; height: 5"
    material="color: red"
    gps-new-entity-place="latitude: -3.7413823; longitude: -38.5131173;">
 </a-entity>

</a-scene>

</body>
</html>
