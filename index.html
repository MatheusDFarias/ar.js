<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Navegador AR com Three.js Nativo</title>

  <link rel="icon" href="data:,">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; background-color: #000; }
    
    /* Camada 1: Câmera de fundo */
    #webcam-video {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1;
    }

    /* Camada 2: Canvas do Three.js (Seta 3D) */
    #canvas-three {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none;
    }

    /* Interface (HUD e Mapa) */
    #mini-map {
      position: absolute; bottom: 20px; right: 20px;
      width: 140px; height: 140px; border-radius: 50%;
      border: 3px solid #fff; box-shadow: 0px 0px 10px rgba(0,0,0,0.5); z-index: 10;
    }
    #hud-texto {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8); color: white; padding: 10px 20px;
      border-radius: 20px; font-size: 16px; font-weight: bold; z-index: 10;
      text-align: center; width: 80%; max-width: 300px; white-space: pre-line;
    }
    #tela-permissao {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95); color: white; z-index: 99;
      display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;
    }
    #btn-iniciar {
      background: #00ffcc; color: black; border: none; padding: 15px 30px;
      font-size: 18px; font-weight: bold; border-radius: 25px; cursor: pointer; margin-top: 20px;
    }
  </style>
</head>
<body>

  <div id="tela-permissao">
    <h2>Navegador AR 3D (Three.js)</h2>
    <p>Acesse os sensores de localização e orientação para alinhar a rota virtual na tela.</p>
    <button id="btn-iniciar">ATIVAR NAVEGADOR</button>
  </div>

  <div id="hud-texto">Aguardando ativação...</div>
  
  <video id="webcam-video" autoplay playsinline></video>
  <canvas id="canvas-three"></canvas>
  <div id="mini-map"></div>

  <script>
    // --- Configurações Geográficas ---
    let posAtual = { lat: -3.7413823, lng: -38.5131173 }; // Inicial (Fortaleza)
    const posDestino = { lat: -3.74128, lng: -38.510776 };
    let bussolaHeading = 0;

    // --- Variáveis do Three.js ---
    let cena, camera, renderizador, setaGrupo;

    // Inicialização ao clicar no botão
    document.getElementById('btn-iniciar').addEventListener('click', async function() {
      document.getElementById('tela-permissao').style.display = 'none';
      document.getElementById('hud-texto').innerText = "Iniciando câmera e sensores...";

      // 1. Ativar Câmera Nativa HTML5
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
        document.getElementById('webcam-video').srcObject = stream;
      } catch (err) {
        alert("Não foi possível acessar a câmera traseira.");
        console.error(err);
      }

      // 2. Pedir permissões de Orientação (Bússola)
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
          .then(state => {
            if (state === 'granted') window.addEventListener('deviceorientationabsolute', tratarOrientacao, true);
            inicializarSistemas();
          }).catch(inicializarSistemas);
      } else {
        const eventoDisponivel = 'ondeviceorientationabsolute' in window ? 'deviceorientationabsolute' : 'deviceorientation';
        window.addEventListener(eventoDisponivel, tratarOrientacao, true);
        inicializarSistemas();
      }
    });

    function tratarOrientacao(event) {
      if (event.webkitCompassHeading) {
        bussolaHeading = event.webkitCompassHeading;
      } else if (event.alpha !== null) {
        bussolaHeading = (360 - event.alpha) % 360;
      }
    }

    function inicializarSistemas() {
      configurarThreeJS();
      ativarGPS();
      animar();
    }

    // --- CONFIGURAÇÃO DO THREE.JS ---
    function configurarThreeJS() {
      const canvas = document.getElementById('canvas-three');
      
      // Criando a Cena
      cena = new THREE.Scene();

      // Câmera Perspectiva fixa olhando para frente
      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 0, 0);

      // Renderizador com fundo transparente (alpha: true)
      renderizador = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
      renderizador.setSize(window.innerWidth, window.innerHeight);
      renderizador.setPixelRatio(window.devicePixelRatio);

      // Criando a Seta Mecânica (Cone + Haste)
      setaGrupo = new THREE.Group();

      // Cone (Ponta da seta)
      const coneGeo = new THREE.ConeGeometry(0.25, 0.8, 4); // Pirâmide leve de 4 lados para performance
      const coneMat = new THREE.MeshBasicMaterial({ color: 0xff2222 });
      const cone = new THREE.Mesh(coneGeo, coneMat);
      cone.position.set(0, 0.4, 0); 

      // Caixa (Corpo da seta)
      const caixaGeo = new THREE.BoxGeometry(0.1, 0.4, 0.1);
      const caixaMat = new THREE.MeshBasicMaterial({ color: 0x990000 });
      const caixa = new THREE.Mesh(caixaGeo, caixaMat);
      caixa.position.set(0, 0, 0);

      // Monta e rotaciona o grupo para ficar deitado apontando para a frente da tela
      setaGrupo.add(cone);
      setaGrupo.add(caixa);
      
      // Posiciona a seta no HUD inferior centralizado na tela do usuário
      setaGrupo.position.set(0, -1.2, -3.5); 
      cena.add(setaGrupo);

      // Ajuste de redimensionamento de tela
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderizador.setSize(window.innerWidth, window.innerHeight);
      });
    }

    // --- CÁLCULOS MATEMÁTICOS ---
    function calcularBearing(lat1, lon1, lat2, lon2) {
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const lat1Rad = lat1 * Math.PI / 180;
      const lat2Rad = lat2 * Math.PI / 180;
      const y = Math.sin(dLon) * Math.cos(lat2Rad);
      const x = Math.cos(lat1Rad) * Math.sin(lat2Rad) - Math.sin(lat1Rad) * Math.cos(lat2Rad) * Math.cos(dLon);
      return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
    }

    function calcularDistancia(lat1, lon1, lat2, lon2) {
      const R = 6371e3;
      const rLat1 = lat1 * Math.PI / 180; const rLat2 = lat2 * Math.PI / 180;
      const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(rLat1) * Math.cos(rLat2) * Math.sin(dLon/2) * Math.sin(dLon/2);
      return Math.round(R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))));
    }

    // --- LOOP DE RENDERIZAÇÃO (TICK) ---
    function animar() {
      requestAnimationFrame(animar);

      if (setaGrupo) {
        // Ângulo absoluto em que o alvo está
        const rumoDestino = calcularBearing(posAtual.lat, posAtual.lng, posDestino.lat, posDestino.lng);
        
        // Diferença angular baseada para onde o nariz do celular aponta
        const anguloFinalGraus = rumoDestino - bussolaHeading;
        const anguloRad = (anguloFinalGraus * Math.PI) / 180;

        // Reseta rotações e aplica no eixo Z (para girar em formato de bússola na tela 2D/3D frontal)
        setaGrupo.rotation.set(0, 0, -anguloRad);
      }

      renderizador.render(cena, camera);
    }

    // --- MAPA LEAFLET ---
    const map = L.map('mini-map', { zoomControl: false, attributionControl: false }).setView([posAtual.lat, posAtual.lng], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const marcadorUsuario = L.marker([posAtual.lat, posAtual.lng]).addTo(map);
    const marcadorDestino = L.marker([posDestino.lat, posDestino.lng]).addTo(map);
    const rotaLinha = L.polyline([[posAtual.lat, posAtual.lng], [posDestino.lat, posDestino.lng]], { color: '#ff2222', weight: 4 }).addTo(map);

    function ativarGPS() {
      if (navigator.geolocation) {
        navigator.geolocation.watchPosition((position) => {
          posAtual.lat = position.coords.latitude;
          posAtual.lng = position.coords.longitude;

          marcadorUsuario.setLatLng([posAtual.lat, posAtual.lng]);
          map.setView([posAtual.lat, posAtual.lng]);
          rotaLinha.setLatLngs([[posAtual.lat, posAtual.lng], [posDestino.lat, posDestino.lng]]);

          const metros = calcularDistancia(posAtual.lat, posAtual.lng, posDestino.lat, posDestino.lng);
          document.getElementById('hud-texto').innerText = `${metros}m para o destino.\nSiga a seta 3D vermelha!`;
        }, (err) => {
          console.warn("Usando coordenadas simuladas no computador.");
          const metros = calcularDistancia(posAtual.lat, posAtual.lng, posDestino.lat, posDestino.lng);
          document.getElementById('hud-texto').innerText = `${metros}m (Simulado).\nSiga a seta vermelha!`;
        }, { enableHighAccuracy: true, maximumAge: 0 });
      }
    }
  </script>
</body>
</html>
