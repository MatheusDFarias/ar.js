<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Navegador AR.js + Leaflet</title>

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    
    /* Estilo do Mini-Mapa na tela do AR */
    #mini-map {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 3px solid #fff;
      box-shadow: 0px 0px 12px rgba(0,0,0,0.6);
      z-index: 999;
      transition: transform 0.1s ease;
    }
  </style>
</head>
<body>

  <div id="mini-map"></div>

  <a-scene 
    vr-mode-ui="enabled: false"
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;">
    
    <a-camera id="ar-camera" gps-new-camera="simulateLatitude: -3.7413823; simulateLongitude: -38.5131173"></a-camera>

    <a-entity 
      gps-new-entity-place="latitude: -3.74128; longitude: -38.510776"
      scale="4 4 4">
      <a-cone material="color: #ff0000; opacity: 0.8" rotation="180 0 0" position="0 5 0"></a-cone>
      <a-text value="Seu Destino" align="center" position="0 7 0" scale="5 5 5" look-at="#ar-camera"></a-text>
    </a-entity>

  </a-scene>

  <script>
    // Coordenadas fornecidas
    const origem = { lat: -3.7413823, lng: -38.5131173 };
    const destino = { lat: -3.74128, lng: -38.510776 };

    // 1. Inicializa o mapa do Leaflet focado na sua origem
    const map = L.map('mini-map', {
      zoomControl: false,
      attributionControl: false
    }).setView([origem.lat, origem.lng], 16);

    // Adiciona o mapa de ruas gratuito (OpenStreetMap)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Marcadores no Mini-mapa
    const marcadorUsuario = L.marker([origem.lat, origem.lng]).addTo(map).bindPopup('Você');
    const marcadorDestino = L.marker([destino.lat, destino.lng]).addTo(map).bindPopup('Destino');

    // Desenha uma linha reta simples (métrica) ligando a origem ao destino no mapa
    const rotaLinha = L.polyline([
      [origem.lat, origem.lng],
      [destino.lat, destino.lng]
    ], { color: 'blue', weight: 4, opacity: 0.7 }).addTo(map);


    // 2. Sincronização de Movimento Real (GPS)
    if (navigator.geolocation) {
      navigator.geolocation.watchPosition((position) => {
        const latAtual = position.coords.latitude;
        const lngAtual = position.coords.longitude;

        // Atualiza a posição do usuário no mapa 2D conforme ele anda
        marcadorUsuario.setLatLng([latAtual, lngAtual]);
        map.setView([latAtual, lngAtual]);
        
        // Atualiza a linha do trajeto dinamicamente
        rotaLinha.setLatLngs([[latAtual, lngAtual], [destino.lat, destino.lng]]);
      }, (err) => {
        console.warn("Aguardando sinal de GPS preciso...", err);
      }, {
        enableHighAccuracy: true
      });
    }

    // 3. Sincronização de Direção (Bússola)
    // Faz o mini-mapa rotacionar para que a frente do mapa seja sempre para onde você está olhando
    const mapElement = document.getElementById('mini-map');
    window.addEventListener('deviceorientationabsolute', (event) => {
      if (event.alpha !== null) {
        let bussolaGraus = event.alpha;
        // Rotaciona a DIV do Leaflet inversamente ao giro do celular
        mapElement.style.transform = `rotate(${-bussolaGraus}deg)`;
      }
    }, true);
  </script>

</body>
</html>
