<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Navegação AR.js Core Localização</title>

  <link rel="icon" href="data:,">

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }
    #mini-map {
      position: absolute; bottom: 20px; right: 20px;
      width: 140px; height: 140px; border-radius: 50%;
      border: 3px solid #fff; box-shadow: 0px 0px 10px rgba(0,0,0,0.5); z-index: 999;
    }
    #hud-texto {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8); color: white; padding: 10px 20px;
      border-radius: 20px; font-size: 16px; font-weight: bold; z-index: 1000;
      text-align: center; width: 80%; max-width: 300px;
      white-space: pre-line;
    }
    #tela-permissao {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95); color: white; z-index: 9999;
      display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;
    }
    #btn-iniciar {
      background: #00ffcc; color: black; border: none; padding: 15px 30px;
      font-size: 18px; font-weight: bold; border-radius: 25px; cursor: pointer; margin-top: 20px;
    }
  </style>
</head>
<body>

  <div id="tela-permissao">
    <h2>Navegador AR 3D</h2>
    <p>Precisamos acessar os sensores de orientação espacial e localização do seu aparelho para renderizar a rota.</p>
    <button id="btn-iniciar">ATIVAR SENSORES</button>
  </div>

  <div id="hud-texto">Aguardando ativação dos sensores...</div>
  <div id="mini-map"></div>

  <script>
    // Coordenadas iniciais (Fortaleza)
    let posAtual = { lat: -3.7413823, lng: -38.5131173 };
    const posDestino = { lat: -3.74128, lng: -38.510776 };
    let bussolaHeading = 0; // Direção do celular em graus (0 = Norte, 90 = Leste...)

    // Captura de orientação absoluta da bússola (Correção para APIs obsoletas)
    function PurificarOrientacao(event) {
      if (event.webkitCompassHeading) {
        bussolaHeading = event.webkitCompassHeading; // iOS nativo
      } else if (event.alpha !== null) {
        // Android / Chrome: converte o valor alpha em rumo magnético de bússola
        bussolaHeading = (360 - event.alpha) % 360;
      }
    }

    document.getElementById('btn-iniciar').addEventListener('click', function() {
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
          .then(permissionState => {
            if (permissionState === 'granted') {
              window.addEventListener('deviceorientationabsolute', PurificarOrientacao, true);
              inicializarApp();
            } else {
              alert('A bússola foi negada. A seta pode não apontar corretamente.');
              inicializarApp(); 
            }
          })
          .catch(err => {
            console.error(err);
            inicializarApp();
          });
      } else {
        // Navegadores que não exigem prompt síncrono (Android antigos / Desktop)
        if ('ondeviceorientationabsolute' in window) {
          window.addEventListener('deviceorientationabsolute', PurificarOrientacao, true);
        } else {
          window.addEventListener('deviceorientation', PurificarOrientacao, true);
        }
        inicializarApp();
      }
    });

    function inicializarApp() {
      document.getElementById('tela-permissao').style.display = 'none';
      document.getElementById('hud-texto').innerText = "Calibrando GPS e Renderizando Seta...";
      ativarGPS();
    }

    // Função matemática para calcular o Rumo Geográfico (Bearing) entre dois pontos
    function calcularBearing(lat1, lon1, lat2, lon2) {
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const lat1Rad = lat1 * Math.PI / 180;
      const lat2Rad = lat2 * Math.PI / 180;
      const y = Math.sin(dLon) * Math.cos(lat2Rad);
      const x = Math.cos(lat1Rad) * Math.sin(lat2Rad) - Math.sin(lat1Rad) * Math.cos(lat2Rad) * Math.cos(dLon);
      const brng = Math.atan2(y, x) * 180 / Math.PI;
      return (brng + 360) % 360;
    }

    // COMPONENTE DA SETA HUD MATEMÁTICA
    AFRAME.registerComponent('seta-navegacao-hud', {
      tick: function () {
        // Calcula a direção que o destino está em relação ao norte real
        const bearingDestino = calcularBearing(posAtual.lat, posAtual.lng, posDestino.lat, posDestino.lng);
        
        // Calcula o desvio angular baseado na rotação atual do aparelho (bussolaHeading)
        let rotaYLocal = bussolaHeading - bearingDestino;

        // X: 90 deita o cone para apontar para frente. Y atualiza dinamicamente conforme você vira o corpo.
        this.el.setAttribute('rotation', { x: 90, y: rotaYLocal, z: 0 });

        // Garante a visibilidade imediata na tela
        if (this.el.getAttribute('visible') === 'false') {
          this.el.setAttribute('visible', 'true');
        }
      }
    });
  </script>

  <a-scene embedded arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;">
    
    <a-camera id="ar-camera" gps-camera="simulateLatitude: -3.7413823; simulateLongitude: -38.5131173;" rotation-reader>
      
      <a-entity 
        id="seta3d" 
        seta-navegacao-hud
        position="0 -0.5 -1.2" 
        scale="1 1 1"
        visible="false">
        <a-cone material="color: #ff2222; shader: flat" radius-bottom="0.06" radius-top="0" height="0.22"></a-cone>
        <a-box material="color: #990000; shader: flat" width="0.02" height="0.07" depth="0.02" position="0 -0.11 0"></a-box>
      </a-entity>

    </a-camera>

    <a-entity id="objeto-destino" gps-entity-place="latitude: -3.74128; longitude: -38.510776">
      <a-cylinder material="color: #00ffcc; opacity: 0.4; shader: flat" radius="2" height="30" position="0 15 0"></a-cylinder>
    </a-entity>
  </a-scene>

  <script>
    // --- MAPA LEAFLET ---
    const map = L.map('mini-map', { zoomControl: false, attributionControl: false }).setView([posAtual.lat, posAtual.lng], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const marcadorUsuario = L.marker([posAtual.lat, posAtual.lng]).addTo(map);
    const marcadorDestino = L.marker([posDestino.lat, posDestino.lng]).addTo(map);
    const rotaLinha = L.polyline([[posAtual.lat, posAtual.lng], [posDestino.lat, posDestino.lng]], { color: '#ff2222', weight: 4 }).addTo(map);

    function calcularDistancia(lat1, lon1, lat2, lon2) {
      const R = 6371e3; // Raio da Terra em metros
      const rLat1 = lat1 * Math.PI / 180; const rLat2 = lat2 * Math.PI / 180;
      const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(rLat1) * Math.cos(rLat2) * Math.sin(dLon/2) * Math.sin(dLon/2);
      return Math.round(R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))));
    }

    function ativarGPS() {
      if (navigator.geolocation) {
        navigator.geolocation.watchPosition((position) => {
          posAtual.lat = position.coords.latitude;
          posAtual.lng = position.coords.longitude;

          // Atualiza o mini-mapa em tempo real
          marcadorUsuario.setLatLng([posAtual.lat, posAtual.lng]);
          map.setView([posAtual.lat, posAtual.lng]);
          rotaLinha.setLatLngs([[posAtual.lat, posAtual.lng], [posDestino.lat, posDestino.lng]]);

          // Atualiza a distância no painel superior
          const metros = calcularDistancia(posAtual.lat, posAtual.lng, posDestino.lat, posDestino.lng);
          document.getElementById('hud-texto').innerText = `${metros}m para o destino.\nSiga a seta 3D vermelha!`;

        }, (err) => {
          console.error("GPS Nativo indisponível: ", err);
          // Fallback para testes em computadores (usará a distância com base na simulação)
          const metros = calcularDistancia(posAtual.lat, posAtual.lng, posDestino.lat, posDestino.lng);
          document.getElementById('hud-texto').innerText = `${metros}m (Modo Simulado).\nSiga a seta 3D vermelha!`;
        }, { enableHighAccuracy: true, maximumAge: 0 });
      }
    }
  </script>
</body>
</html>
